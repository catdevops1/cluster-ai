apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-ai-api
  namespace: cluster-ai
  labels:
    app: cluster-ai-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-ai-api
  template:
    metadata:
      labels:
        app: cluster-ai-api
    spec:
      serviceAccountName: cluster-ai-sa
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: cluster-ai-api
          image: ghcr.io/catdevops1/cluster-ai-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_NAME
              value: "llama3.2:1b"
            - name: OLLAMA_URL
              valueFrom:
                secretKeyRef:
                  name: cluster-ai-secret
                  key: OLLAMA_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cluster-ai-secret
                  key: ANTHROPIC_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cluster-ai-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: cluster-ai-secret
                  key: TELEGRAM_CHAT_ID        
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6  
