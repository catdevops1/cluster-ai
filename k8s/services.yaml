apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: cluster-ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: cluster-ai-api
  namespace: cluster-ai
spec:
  selector:
    app: cluster-ai-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: cluster-ai-frontend
  namespace: cluster-ai
spec:
  selector:
    app: cluster-ai-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP

